{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #fff;
            min-height: 100vh;
        }

        .contact-card {
            border: none;
            border-radius: 20px;
        }

        .contact-header {
            background-color: #f8f9fa;
            color: #212529;
            padding: 3rem 1rem;
            text-align: center;
            border-radius: 20px;
        }

        textarea.form-control {
            resize: none;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="contact-header shadow-sm mb-4">
        <h1 class="display-4 fw-bold">Let’s Connect!</h1>
        <p class="lead mb-0">
            Have a question or suggestion? We’d love to hear from you.
        </p>
    </div>

    <div class="card contact-card shadow-lg mx-auto" style="max-width: 650px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <p class="mb-1"><strong>📞 Call Us:</strong> +254 712 345 678</p>
                <p><strong>✉️ Email:</strong> hello@examplemail.com</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Your Name</label>
                    <input type="text" value="{{editappointment.name}}" class="form-control" id="name" name="name"
                           placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Your Email</label>
                    <input type="email" value="{{editappointment.email}}" class="form-control" id="email" name="email"
                           placeholder="you@gmail.com" required>
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label fw-semibold">Your Message</label>
                    <textarea class="form-control" id="message" name="message"
                              rows="5" placeholder="any suggestion..." required>{{editappointment.message}} </textarea>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
